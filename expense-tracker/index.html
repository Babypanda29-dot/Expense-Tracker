<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Expense Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container py-5">
    <div class="app-card mx-auto">
      <h1 class="text-center mb-2">Personal Expense Tracker</h1>
      <p class="text-center text-muted mb-4">Track income, expenses, and balance easily</p>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="summary income">
            <h6>Total Income</h6>
            <h3 id="income">₹0</h3>
          </div>
        </div>
        <div class="col-md-4">
          <div class="summary expense">
            <h6>Total Expense</h6>
            <h3 id="expense">₹0</h3>
          </div>
        </div>
        <div class="col-md-4">
          <div class="summary balance">
            <h6>Balance</h6>
            <h3 id="balance">₹0</h3>
          </div>
        </div>
      </div>

      <form id="expenseForm" class="row g-3 mb-4">
        <div class="col-md-4">
          <input type="text" id="title" class="form-control" placeholder="Title" required>
        </div>

        <div class="col-md-3">
          <input type="number" id="amount" class="form-control" placeholder="Amount" required>
        </div>

        <div class="col-md-3">
          <select id="type" class="form-select" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>

        <div class="col-md-2 d-grid">
          <button class="btn btn-success">Add</button>
        </div>
      </form>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Transactions</h4>
        <button onclick="clearAll()" class="btn btn-outline-danger btn-sm">Clear All</button>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>Title</th>
              <th>Amount</th>
              <th>Type</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="transactionList"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
